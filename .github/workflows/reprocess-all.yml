name: Reprocess All Videos

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only check which videos need re-processing (don't actually process)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  reprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Reprocess all videos
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          OUTPUT_FOLDER_ID: ${{ secrets.OUTPUT_FOLDER_ID }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python .github/scripts/reprocess_all.py --dry-run
          else
            python .github/scripts/reprocess_all.py
          fi
