name: Process TotemTV Video

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Google Drive file ID of the raw video'
        required: true
        type: string
      file_name:
        description: 'Original filename'
        required: true
        type: string
      climber_name:
        description: 'Climber name (שם מטפס)'
        required: true
        type: string
      route_name:
        description: 'Route name (שם מסלול)'
        required: true
        type: string
      grade:
        description: 'Grade (דירוג)'
        required: true
        type: string
      sheet_row:
        description: 'Row number in tracking sheet'
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra

      - name: Install Python dependencies
        run: |
          pip install google-api-python-client google-auth google-auth-httplib2 gspread

      - name: Process video
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          UNEDITED_FOLDER_ID: ${{ secrets.UNEDITED_FOLDER_ID }}
          OUTPUT_FOLDER_ID: ${{ secrets.OUTPUT_FOLDER_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          FILE_ID: ${{ inputs.file_id }}
          FILE_NAME: ${{ inputs.file_name }}
          CLIMBER_NAME: ${{ inputs.climber_name }}
          ROUTE_NAME: ${{ inputs.route_name }}
          GRADE: ${{ inputs.grade }}
          SHEET_ROW: ${{ inputs.sheet_row }}
        run: python .github/scripts/process_video.py
